<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Economics Society Market Ticker</title>
<style>
  body { margin:0; background:#111; font-family:Arial, sans-serif; }
  #ticker-container {
    width: 100%;
    overflow: hidden;
    white-space: nowrap;
    background: #111;
    border-top: 2px solid #444;
    border-bottom: 2px solid #444;
    padding: 10px 0;
    box-sizing: border-box;
  }
  #ticker {
    display: inline-block;
    animation: scroll 30s linear infinite;
  }
  #ticker span {
    display: inline-block;
    padding: 0 2rem;
    font-weight: bold;
  }
  #ticker span.separator::after {
    content: " |";
    padding-left: 1rem;
    color: #888;
  }
  @keyframes scroll {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }
</style>
</head>
<body>

<div id="ticker-container">
  <div id="ticker">Loading market data…</div>
</div>

<script>
const symbols = [
  { symbol: "SPX", name: "S&P 500" },
  { symbol: "DJI", name: "Dow Jones" },
  { symbol: "NDX", name: "Nasdaq 100" },
  { symbol: "FTSE", name: "FTSE 100" },
  { symbol: "DAX", name: "DAX" },
  { symbol: "EUR/USD", name: "EUR/USD" },
  { symbol: "GBP/USD", name: "GBP/USD" },
  { symbol: "XAU/USD", name: "Gold" },
  { symbol: "WTI", name: "Oil WTI" },
  { symbol: "BTC/USD", name: "Bitcoin" }
];

const ticker = document.getElementById("ticker");
const apiKey = "076bea3db7e5401081c46931a053c55a";

async function fetchPrices() {
  try {
    const url = `https://api.twelvedata.com/price?symbol=${symbols.map(s => s.symbol).join(",")}&apikey=${apiKey}`;
    const response = await fetch(url);
    const data = await response.json();

    if (data.status === "error") {
      ticker.innerHTML = "Error loading market data…";
      console.error(data);
      return;
    }

    const tickerItems = symbols.map(s => {
      const price = data[s.symbol]?.price || "N/A";
      const color = parseFloat(price) >= 0 ? "#0f0" : "#f00"; // green/red
      return `<span class="separator" style="color:${color}">${s.name}: ${price}</span>`;
    });

    ticker.innerHTML = tickerItems.join("");
  } catch (err) {
    ticker.innerHTML = "Error loading market data…";
    console.error(err);
  }
}

// Initial fetch and refresh every 60 seconds
fetchPrices();
setInterval(fetchPrices, 60000);
</script>

</body>
</html>
